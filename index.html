<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NUKRAX — nukrax.sh</title>

  <!-- Fonts: Bebas Neue (display) + Space Mono (mono detail) + Outfit (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Outfit:wght@200;300;400;600&display=swap" rel="stylesheet" />

  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    /* ============================================================
       CSS VARIABLES & RESET
    ============================================================ */
    :root {
      --black:      #080808;
      --deep:       #0d0d0d;
      --charcoal:   #161616;
      --mid:        #222222;
      --steel:      #3a3a3a;
      --primary:    #4a4a4a;
      --muted:      #6b6b6b;
      --smoke:      #a8a8a8;
      --offwhite:   #e8e8e6;
      --white:      #f4f4f2;
      --accent:     #c8c8c4;
      --glow:       rgba(200,200,196,0.08);

      --font-display: 'Bebas Neue', sans-serif;
      --font-mono:    'Space Mono', monospace;
      --font-body:    'Outfit', sans-serif;

      --nav-h:      72px;
      --ease-out:   cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in:    cubic-bezier(0.7, 0, 0.84, 0);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      background: var(--black);
      color: var(--offwhite);
      font-family: var(--font-body);
      font-weight: 300;
      overflow-x: hidden;
    }

    /* Custom cursor — desktop (fine pointer) only */
    @media (pointer: fine) {
      body { cursor: none; }
    }
    @media (pointer: coarse) {
      body { cursor: auto; }
      #cursor-dot, #cursor-ring { display: none !important; }
      .btn-hero, .btn-ghost, .btn-primary, .hamburger, .card { cursor: pointer; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--black); }
    ::-webkit-scrollbar-thumb { background: var(--steel); border-radius: 2px; }

    /* ============================================================
       GRAIN OVERLAY
    ============================================================ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px 200px;
      animation: grain 0.5s steps(1) infinite;
    }

    @keyframes grain {
      0%, 100% { transform: translate(0,0); }
      10%       { transform: translate(-2%,-3%); }
      20%       { transform: translate(3%, 2%); }
      30%       { transform: translate(-1%, 4%); }
      40%       { transform: translate(4%,-1%); }
      50%       { transform: translate(-3%, 3%); }
      60%       { transform: translate(2%,-4%); }
      70%       { transform: translate(-4%, 2%); }
      80%       { transform: translate(3%, 1%); }
      90%       { transform: translate(-2%,-2%); }
    }

    /* ============================================================
       CUSTOM CURSOR
    ============================================================ */
    #cursor-dot {
      position: fixed;
      top: 0; left: 0;
      width: 8px; height: 8px;
      background: var(--white);
      border-radius: 50%;
      pointer-events: none;
      z-index: 10000;
      transform: translate(-50%, -50%);
      transition: width 0.2s var(--ease-out),
                  height 0.2s var(--ease-out),
                  background 0.2s ease,
                  opacity 0.3s ease;
      mix-blend-mode: difference;
    }

    #cursor-ring {
      position: fixed;
      top: 0; left: 0;
      width: 36px; height: 36px;
      border: 1px solid rgba(200,200,196,0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.35s var(--ease-out),
                  height 0.35s var(--ease-out),
                  border-color 0.3s ease,
                  opacity 0.3s ease;
      will-change: transform;
    }

    body.cursor-hover #cursor-dot  { width: 12px; height: 12px; }
    body.cursor-hover #cursor-ring {
      width: 60px; height: 60px;
      border-color: rgba(200,200,196,0.9);
    }

    /* ============================================================
       NAVBAR
    ============================================================ */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      background: transparent;
      transition: background 0.5s ease, backdrop-filter 0.5s ease,
                  border-bottom 0.5s ease;
    }

    #navbar.scrolled {
      background: rgba(8,8,8,0.72);
      backdrop-filter: blur(18px) saturate(120%);
      -webkit-backdrop-filter: blur(18px) saturate(120%);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    /* Logo */
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      animation: logoFadeIn 1.4s var(--ease-out) 0.2s both;
    }

    /* White pill so the logo is always visible on the dark nav */
    .nav-logo-img-pill {
      background: #ffffff;
      border-radius: 6px;
      padding: 5px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: logoFloat 4s ease-in-out infinite;
      flex-shrink: 0;
    }

    .nav-logo-img-pill img {
      height: 32px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    .nav-logo-text {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: lowercase;
    }

    @keyframes logoFadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-4px); }
    }

    /* Nav links */
    .nav-links {
      display: flex;
      align-items: center;
      gap: 36px;
      list-style: none;
      animation: navFadeIn 1.4s var(--ease-out) 0.4s both;
    }

    .nav-links a {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--smoke);
      text-decoration: none;
      position: relative;
      transition: color 0.3s ease;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0;
      width: 0; height: 1px;
      background: var(--offwhite);
      transition: width 0.3s var(--ease-out);
    }

    .nav-links a:hover { color: var(--white); }
    .nav-links a:hover::after { width: 100%; }

    /* CTA Button */
    .btn-primary {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--black);
      background: var(--offwhite);
      border: none;
      padding: 10px 22px;
      cursor: none;
      position: relative;
      overflow: hidden;
      transition: color 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--steel);
      transform: translateX(-101%);
      transition: transform 0.4s var(--ease-out);
    }

    .btn-primary:hover { color: var(--white); }
    .btn-primary:hover::before { transform: translateX(0); }

    .btn-primary span { position: relative; z-index: 1; }

    /* Hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: none;
      background: none;
      border: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 1px;
      background: var(--offwhite);
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .hamburger.active span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    /* Mobile nav drawer */
    .mobile-menu {
      display: none;
      position: fixed;
      top: var(--nav-h); left: 0; right: 0;
      background: rgba(8,8,8,0.96);
      backdrop-filter: blur(20px);
      padding: 32px 40px;
      flex-direction: column;
      gap: 28px;
      z-index: 999;
      transform: translateY(-10px);
      opacity: 0;
      transition: transform 0.4s var(--ease-out), opacity 0.4s ease;
      pointer-events: none;
    }
    .mobile-menu.open {
      display: flex;
      transform: translateY(0);
      opacity: 1;
      pointer-events: all;
    }
    .mobile-menu a {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--smoke);
      text-decoration: none;
    }

    @keyframes navFadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       HERO SECTION
    ============================================================ */
    #hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-height: 700px;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    /* Three.js canvas fills the hero */
    #hero-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Radial vignette */
    #hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 70% 50%, transparent 30%, rgba(8,8,8,0.9) 100%);
      z-index: 1;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding: 0 60px;
      max-width: 780px;
    }

    .hero-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
      opacity: 0;
      transform: translateY(20px);
      animation: heroReveal 1s var(--ease-out) 0.8s forwards;
    }

    .hero-eyebrow span {
      display: inline-block;
      width: 30px; height: 1px;
      background: var(--steel);
      vertical-align: middle;
      margin-right: 12px;
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(72px, 10vw, 148px);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--white);
      opacity: 0;
      transform: translateY(40px);
      animation: heroReveal 1.2s var(--ease-out) 1s forwards;
    }

    .hero-title .line-2 {
      color: transparent;
      -webkit-text-stroke: 1px rgba(200,200,196,0.4);
      display: block;
    }

    .hero-sub {
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.08em;
      line-height: 1.7;
      max-width: 380px;
      margin-top: 28px;
      opacity: 0;
      transform: translateY(20px);
      animation: heroReveal 1s var(--ease-out) 1.3s forwards;
    }

    .hero-cta-row {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-top: 48px;
      opacity: 0;
      transform: translateY(20px);
      animation: heroReveal 1s var(--ease-out) 1.5s forwards;
    }

    .btn-hero {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--black);
      background: var(--offwhite);
      border: none;
      padding: 14px 32px;
      cursor: none;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      display: inline-block;
      transition: color 0.35s ease;
    }

    .btn-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--primary);
      transform: translateX(-101%);
      transition: transform 0.45s var(--ease-out);
      z-index: 0;
    }
    .btn-hero:hover { color: var(--white); }
    .btn-hero:hover::before { transform: translateX(0); }
    .btn-hero span { position: relative; z-index: 1; }

    .btn-ghost {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--smoke);
      background: none;
      border: 1px solid var(--steel);
      padding: 13px 28px;
      cursor: none;
      text-decoration: none;
      display: inline-block;
      transition: color 0.3s ease, border-color 0.3s ease;
    }
    .btn-ghost:hover { color: var(--white); border-color: var(--smoke); }

    .scroll-indicator {
      position: absolute;
      bottom: 32px;
      left: 60px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 14px;
      opacity: 0;
      animation: heroReveal 1s var(--ease-out) 2s forwards;
    }

    .scroll-indicator span {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .scroll-line {
      width: 40px; height: 1px;
      background: var(--steel);
      position: relative;
      overflow: hidden;
    }

    .scroll-line::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: var(--offwhite);
      animation: scrollAnim 2s ease-in-out 2.5s infinite;
    }

    @keyframes scrollAnim {
      0%   { left: -100%; }
      50%  { left: 0; }
      100% { left: 100%; }
    }

    @keyframes heroReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       TICKER / MARQUEE
    ============================================================ */
    .ticker-wrap {
      background: var(--charcoal);
      border-top: 1px solid var(--mid);
      border-bottom: 1px solid var(--mid);
      overflow: hidden;
      padding: 14px 0;
      white-space: nowrap;
    }

    .ticker-track {
      display: inline-flex;
      gap: 0;
      animation: ticker 28s linear infinite;
    }

    .ticker-item {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 40px;
    }

    .ticker-item .dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--steel);
      border-radius: 50%;
      margin-left: 40px;
      vertical-align: middle;
    }

    @keyframes ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ============================================================
       SECTIONS SHARED
    ============================================================ */
    section {
      padding: 120px 60px;
    }

    .section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-label::before {
      content: '';
      display: block;
      width: 24px; height: 1px;
      background: var(--steel);
    }

    .section-title {
      font-family: var(--font-display);
      font-size: clamp(40px, 6vw, 80px);
      line-height: 0.95;
      letter-spacing: 0.02em;
      color: var(--white);
    }

    /* Reveal animation class */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.9s var(--ease-out), transform 0.9s var(--ease-out);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.35s; }
    .reveal-delay-4 { transition-delay: 0.5s; }

    /* ============================================================
       FEATURED COLLECTION
    ============================================================ */
    #collection {
      background: var(--deep);
      padding-top: 100px;
      padding-bottom: 100px;
    }

    .collection-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 64px;
      flex-wrap: wrap;
      gap: 24px;
    }

    .collection-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }

    .card {
      position: relative;
      aspect-ratio: 3/4;
      background: var(--charcoal);
      overflow: hidden;
      cursor: none;
      group: 'card';
    }

    /* Abstract generative art fills each card */
    .card-art {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.7s var(--ease-out);
    }

    .card:hover .card-art { transform: scale(1.06); }

    .card-canvas {
      width: 100%; height: 100%;
      display: block;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(8,8,8,0.9) 0%, rgba(8,8,8,0.1) 60%, transparent 100%);
      transition: opacity 0.4s ease;
    }

    .card-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 28px 24px;
      transform: translateY(12px);
      transition: transform 0.5s var(--ease-out);
    }

    .card:hover .card-info { transform: translateY(0); }

    .card-tag {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .card-name {
      font-family: var(--font-display);
      font-size: 24px;
      letter-spacing: 0.04em;
      color: var(--white);
      margin-bottom: 4px;
    }

    .card-price {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--smoke);
    }

    .card-action {
      position: absolute;
      top: 20px; right: 20px;
      width: 36px; height: 36px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.4s ease, transform 0.4s var(--ease-out);
      cursor: none;
    }

    .card:hover .card-action {
      opacity: 1;
      transform: scale(1);
    }

    .card-action svg { width: 14px; height: 14px; stroke: var(--white); fill: none; }

    /* Wide card (first card spans 2 cols) */
    .card.wide {
      grid-column: span 2;
      aspect-ratio: unset;
      min-height: 500px;
    }

    /* ============================================================
       ABOUT SECTION
    ============================================================ */
    #about {
      background: var(--black);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }

    .about-left .section
